    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {

          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {

    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);

      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');

    // which fired before we swapped the document. Trigger manually if present.

      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

t:1.7;margin:0 0 1rem}\n  .mathset .para .body p:last-child{margin-bottom:0}\n  .mathset .para .body ul{margin:.2rem 0 1rem 1.6rem;font-size:1.5rem;line-height:1.7}\n  .mathset .para .body li{margin:.5rem 0;padding-left:.3rem}\n  .subpart{display:flex;gap:.8rem;margin:1.6rem 0 0}\n  .subpart .let{flex:0 0 auto;font-weight:bold;font-size:1.5rem;line-height:1.7}\n  .subpart .subbody{flex:1;min-width:0}\n  .subpart .subbody p{margin:0}\n  .solline{display:flex;align-items:flex-end;gap:1rem;margin:1.3rem 0 .2rem}\n  .sollbl{font-family:'Courier New',monospace;font-size:13px;letter-spacing:.14em;font-weight:bold;color:var(--muted)}\n  .solrule{flex:1;border-bottom:1.5px solid var(--line);height:2.4rem}\n\n  /* ---------- figures ---------- */\n  .figure{width:fit-content;max-width:100%;margin:.4rem auto 2.4rem;border:1px solid var(--line);border-radius:16px;background:#fff;padding:.7rem;cursor:zoom-in;transition:box-shadow .2s ease,transform .2s ease}\n  .figure:hover{box-shadow:0 10px 26px rgba(0,0,0,.12);transform:translateY(-2px)}\n  .figure img{display:block;width:auto;max-width:100%;height:auto;max-height:340px;border-radius:10px;background:#fff}\n  .figcap{font-family:'Courier New',monospace;font-size:12px;letter-spacing:.05em;color:var(--muted);margin-top:.7rem;text-align:center}\n\n  /* ---------- lightbox (pop-out card) ---------- */\n  .lightbox{position:fixed;inset:0;z-index:120;display:none;align-items:center;justify-content:center;background:rgba(22,20,15,.6);padding:2rem}\n  .lightbox.open{display:flex}\n  .lightcard{position:relative;background:#fff;border:1px solid var(--line);border-radius:18px;padding:1rem;max-width:min(940px,94vw);max-height:92vh;box-shadow:0 30px 80px rgba(0,0,0,.45);display:flex;flex-direction:column;transform:scale(.88);opacity:0;transition:transform .3s cubic-bezier(.2,.9,.3,1.25),opacity .25s ease}\n  .lightbox.open .lightcard{transform:scale(1);opacity:1}\n  .lightcard img{display:block;max-width:100%;max-height:78vh;object-fit:contain;border-radius:10px}\n  .lightcard figcaption{font-family:'Courier New',monospace;font-size:13px;letter-spacing:.05em;color:var(--muted);text-align:center;margin-top:.9rem}\n  .lightclose{position:absolute;top:-16px;right:-16px;width:42px;height:42px;border-radius:50%;background:var(--ink);color:#fff;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.3)}\n\n  /* ---------- vocabulary popover ---------- */\n  .pop{position:absolute;z-index:90;max-width:400px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:1.2rem 1.4rem;box-shadow:0 14px 36px rgba(0,0,0,.18);font-family:Georgia,serif;font-size:1.3rem;line-height:1.5;display:none}\n  .pop .word{font-family:'Courier New',monospace;font-size:13px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.5rem;color:var(--term)}\n  .pop .x{float:right;cursor:pointer;color:var(--muted);font-family:sans-serif;margin-left:.6rem;font-size:1.2rem;line-height:1}\n\n  /* ---------- focus + motion polish ---------- */\n  .pacer-btn:focus-visible,.read-q:focus-visible,.pacedock button:focus-visible,.term:focus-visible,.pop .x:focus-visible,.psgnav button:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:8px}\n  .toggle button:focus-visible{outline:2px solid var(--accent);outline-offset:-3px}\n  h1,.read-q{text-wrap:balance}\n  .lede,.para .body{text-wrap:pretty}\n  @media (prefers-reduced-motion: reduce){\n    *{animation-duration:.001ms !important;transition-duration:.001ms !important}\n    html{scroll-behavior:auto !important}\n    .para{opacity:1 !important;transform:none !important}\n  }\n  @media(max-width:620px){\n    .para .body{font-size:1.5rem}\n    .num{width:38px;height:38px;font-size:14px}\n    .r-bar{padding:.7rem 1rem}\n    .psgname{min-width:108px}\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body class=\"lang-en\">\n\n  \n\n  <div class=\"progress-track\"><div class=\"progress\" id=\"prog\"><\u002Fdiv><\u002Fdiv>\n\n  <!-- ===================== TOP BAR ===================== -->\n  <div class=\"r-bar\">\n    <div class=\"bar-left\">\n      <span class=\"kicker\"><span class=\"en\">Math<\u002Fspan><span class=\"es\">Matemáticas<\u002Fspan><\u002Fspan>\n      <button class=\"losc-pill\" id=\"loscPill\" onclick=\"toggleLOSC()\" aria-expanded=\"false\">LOSC <span class=\"car\">▾<\u002Fspan><\u002Fbutton>\n      <div class=\"losc-pop\" id=\"loscPop\">\n        <div class=\"losc-sec\">\n          <div class=\"losc-h\"><span class=\"en\">Learning Objective<\u002Fspan><span class=\"es\">Objetivo de aprendizaje<\u002Fspan><\u002Fdiv>\n          <div class=\"losc-ed\"><span class=\"en\">SWBAT read “Spiders: In Pursuit of Prey” and use the spider facts to write and evaluate at least 1 algebraic expression, calculate the surface area of a rectangular prism, and find the least common multiple of two numbers, correctly solving all 3 problems and showing their work.<\u002Fspan><span class=\"es\">Los estudiantes podrán leer “Arañas: en busca de presas” y usar los datos sobre arañas para escribir y evaluar al menos 1 expresión algebraica, calcular el área superficial de un prisma rectangular y hallar el mínimo común múltiplo de dos números, resolviendo correctamente los 3 problemas y mostrando su trabajo.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"losc-sec\">\n          <div class=\"losc-h\"><span class=\"en\">Success Criteria<\u002Fspan><span class=\"es\">Criterios de logro<\u002Fspan><\u002Fdiv>\n          <div class=\"losc-ed\"><span class=\"en\">I am successful when I can: (1) restate one fact from the spider text in my own words; (2) write an expression with a clearly defined variable; (3) show every step of my work; and (4) label each final answer with correct units (ft, ft², $, or days).<\u002Fspan><span class=\"es\">Tengo éxito cuando puedo: (1) reformular un dato del texto sobre arañas con mis propias palabras; (2) escribir una expresión con una variable claramente definida; (3) mostrar cada paso de mi trabajo; y (4) etiquetar cada respuesta final con las unidades correctas (pies, pies², $ o días).<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"bar-right\">\n      <div class=\"psgnav\" role=\"group\" aria-label=\"Passage selector\">\n        <button id=\"psgprev\" onclick=\"prevPassage()\" aria-label=\"Previous passage\">‹<\u002Fbutton>\n        <span class=\"psgname\" id=\"psgname\"><\u002Fspan>\n        <button id=\"psgnext\" onclick=\"nextPassage()\" aria-label=\"Next passage\">›<\u002Fbutton>\n      <\u002Fdiv>\n      <button id=\"pacertoggle\" class=\"pacer-btn off\" onclick=\"togglePacer()\">▸ <span class=\"en\">Reading Pacer<\u002Fspan><span class=\"es\">Marcapasos<\u002Fspan><\u002Fbutton>\n      <div class=\"toggle\" role=\"group\" aria-label=\"Language\">\n        <button id=\"btn-en\" class=\"on\" onclick=\"setLang('en')\">EN<\u002Fbutton>\n        <button id=\"btn-es\" onclick=\"setLang('es')\">ES<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"wrap\">\n\n    <!-- ============================================================= -->\n    <!-- PASSAGE 1 — PHYSICAL EROSION                                   -->\n    <!-- ============================================================= -->\n    <section class=\"psg active\" data-id=\"spiders\">\n      <div class=\"r-header\">\n        <div class=\"eyebrow\"><span class=\"en\">Literacy Connection · Scientific Article<\u002Fspan><span class=\"es\">Conexión literaria · Artículo científico<\u002Fspan><\u002Fdiv>\n        <h1>\n          <span class=\"en\">Spiders: In Pursuit of <span class=\"hl\">Prey<\u002Fspan><\u002Fspan>\n          <span class=\"es\">Arañas: en busca de <span class=\"hl\">presas<\u002Fspan><\u002Fspan>\n        <\u002Fh1>\n        <div class=\"lede\"><span class=\"en\">by Harry Gardner<\u002Fspan><span class=\"es\">por Harry Gardner<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"passage\">\n        <div class=\"para\">\n          <div class=\"num\">1<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">Have you seen a spider today?<\u002Fspan> <span class=\"s\">If you have, that’s not surprising, because spiders live everywhere, indoors and out.<\u002Fspan> <span class=\"s\">They have adapted to living in deserts, caves, high mountain peaks, and even underwater.<\u002Fspan> <span class=\"s\">There are more than 36,000 known species.<\u002Fspan> <span class=\"s\">In the outdoors, there are as many as several million spiders per acre of land.<\u002Fspan> <span class=\"s\">In fact, you are probably six feet from a spider right now!<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">¿Has visto una araña hoy?<\u002Fspan> <span class=\"s\">Si la has visto, no es sorprendente, porque las arañas viven en todas partes, dentro y fuera de los hogares.<\u002Fspan> <span class=\"s\">Se han adaptado a vivir en desiertos, cuevas, altas cumbres de montañas e incluso bajo el agua.<\u002Fspan> <span class=\"s\">Hay más de 36,000 especies conocidas.<\u002Fspan> <span class=\"s\">Al aire libre, puede haber hasta varios millones de arañas por acre de tierra.<\u002Fspan> <span class=\"s\">De hecho, ¡probablemente estés a seis pies de una araña en este momento!<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">2<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">Spiders are predators and eat mainly insects.<\u002Fspan> <span class=\"s\">Because there are so many spiders, they are very important in controlling insect pests.<\u002Fspan> <span class=\"s\">Spiders eat the mosquitoes and yellow flies that can bite us.<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">Las arañas son depredadores y comen principalmente insectos.<\u002Fspan> <span class=\"s\">Como hay tantas arañas, son muy importantes para controlar las plagas de insectos.<\u002Fspan> <span class=\"s\">Las arañas se comen los mosquitos y las moscas amarillas que pueden picarnos.<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">3<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">Many people think that spiders themselves are insects.<\u002Fspan> <span class=\"s\">Actually, they belong to a class of animals called <span class=\"term\" data-k=\"arachnids\" tabindex=\"0\">arachnids<\u002Fspan>.<\u002Fspan> <span class=\"s\">Arachnids have two main body parts (insects have three) and eight legs (insects have six).<\u002Fspan> <span class=\"s\">Other arachnids include scorpions, ticks, mites, and daddy longlegs.<\u002Fspan> <span class=\"s\">Both arachnids and insects belong to a larger group called <span class=\"term\" data-k=\"arthropods\" tabindex=\"0\">arthropods<\u002Fspan>.<\u002Fspan> <span class=\"s\">All members of this group have a hard outer skeleton that covers the body, called an <span class=\"term\" data-k=\"exoskeleton\" tabindex=\"0\">exoskeleton<\u002Fspan>.<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">Mucha gente piensa que las arañas mismas son insectos.<\u002Fspan> <span class=\"s\">En realidad, pertenecen a una clase de animales llamados <span class=\"term\" data-k=\"arachnids\" tabindex=\"0\">arácnidos<\u002Fspan>.<\u002Fspan> <span class=\"s\">Los arácnidos tienen dos partes principales del cuerpo (los insectos tienen tres) y ocho patas (los insectos tienen seis).<\u002Fspan> <span class=\"s\">Otros arácnidos incluyen escorpiones, garrapatas, ácaros y opiliones.<\u002Fspan> <span class=\"s\">Tanto los arácnidos como los insectos pertenecen a un grupo más grande llamado <span class=\"term\" data-k=\"arthropods\" tabindex=\"0\">artrópodos<\u002Fspan>.<\u002Fspan> <span class=\"s\">Todos los miembros de este grupo tienen un esqueleto externo duro que cubre el cuerpo, llamado <span class=\"term\" data-k=\"exoskeleton\" tabindex=\"0\">exoesqueleto<\u002Fspan>.<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">4<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">Many spiders have a clever tool for catching prey: a web made of silk.<\u002Fspan> <span class=\"s\">The spider produces silk from glands in the abdomen.<\u002Fspan> <span class=\"s\">The spider uses its two hind legs to “reel out” a fine strand of silk, and then it starts to weave its web.<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">Muchas arañas tienen una herramienta ingeniosa para atrapar presas: una telaraña hecha de seda.<\u002Fspan> <span class=\"s\">La araña produce seda a partir de glándulas en el abdomen.<\u002Fspan> <span class=\"s\">La araña usa sus dos patas traseras para “soltar” una fina hebra de seda, y luego comienza a tejer su telaraña.<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">5<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">Spiders make different kinds of silk.<\u002Fspan> <span class=\"s\">The yellow-and-black garden spider makes a strong, stretchy silk to build the basic framework of its web.<\u002Fspan> <span class=\"s\">Then it adds a sticky variety that makes it hard for a trapped insect to get away.<\u002Fspan> <span class=\"s\">Spider silk, which is made of protein, is very flexible but stronger than steel!<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">Las arañas producen diferentes tipos de seda.<\u002Fspan> <span class=\"s\">La araña de jardín amarilla y negra produce una seda fuerte y elástica para construir la estructura básica de su telaraña.<\u002Fspan> <span class=\"s\">Luego añade una variedad pegajosa que hace difícil que un insecto atrapado escape.<\u002Fspan> <span class=\"s\">La seda de araña, que está hecha de proteína, ¡es muy flexible pero más fuerte que el acero!<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">6<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">The garden spider weaves an elegant <span class=\"term\" data-k=\"snare\" tabindex=\"0\">snare<\u002Fspan> called an orb web.<\u002Fspan> <span class=\"s\">This web is basically round, with spokes like a bicycle wheel and many strands connecting the spokes.<\u002Fspan> <span class=\"s\">Some orb weavers lie in wait for their prey at the center of the web.<\u002Fspan> <span class=\"s\">Others attach a tripwire to the center of the web.<\u002Fspan> <span class=\"s\">Then they hide nearby, holding onto the line.<\u002Fspan> <span class=\"s\">When the insect struggles, the line vibrates.<\u002Fspan> <span class=\"s\">Then the spider swings into action.<\u002Fspan> <span class=\"s\">A coating of oil on its feet helps it glide across the sticky threads of the web.<\u002Fspan> <span class=\"s\">When it reaches its prey, the spider usually bites it, and the bite is full of <span class=\"term\" data-k=\"venom\" tabindex=\"0\">venom<\u002Fspan>.<\u002Fspan> <span class=\"s\">As the insect stops struggling, the spider wraps its meal in silk.<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">La araña de jardín teje una elegante <span class=\"term\" data-k=\"snare\" tabindex=\"0\">trampa<\u002Fspan> llamada telaraña orbicular.<\u002Fspan> <span class=\"s\">Esta telaraña es básicamente redonda, con radios como una rueda de bicicleta y muchas hebras que conectan los radios.<\u002Fspan> <span class=\"s\">Algunas tejedoras de orbe esperan a su presa en el centro de la telaraña.<\u002Fspan> <span class=\"s\">Otras conectan un hilo de aviso al centro de la telaraña.<\u002Fspan> <span class=\"s\">Luego se esconden cerca, sujetando el hilo.<\u002Fspan> <span class=\"s\">Cuando el insecto se debate, el hilo vibra.<\u002Fspan> <span class=\"s\">Entonces la araña entra en acción.<\u002Fspan> <span class=\"s\">Una capa de aceite en sus patas la ayuda a deslizarse por los hilos pegajosos de la telaraña.<\u002Fspan> <span class=\"s\">Cuando llega a su presa, la araña por lo general la muerde, y la mordedura está llena de <span class=\"term\" data-k=\"venom\" tabindex=\"0\">veneno<\u002Fspan>.<\u002Fspan> <span class=\"s\">A medida que el insecto deja de debatirse, la araña envuelve su comida en seda.<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">7<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">If the spider is hungry, it starts digesting the prey right away.<\u002Fspan> <span class=\"s\">Because spiders don’t have teeth, they must break down their food in another way.<\u002Fspan> <span class=\"s\">They actually do this outside their bodies.<\u002Fspan> <span class=\"s\">They spit digestive juices onto the insect that <span class=\"term\" data-k=\"liquefy\" tabindex=\"0\">liquefy<\u002Fspan> it.<\u002Fspan> <span class=\"s\">Then they can suck down part of their meal a little at a time.<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">Si la araña tiene hambre, empieza a digerir la presa de inmediato.<\u002Fspan> <span class=\"s\">Como las arañas no tienen dientes, deben descomponer su alimento de otra manera.<\u002Fspan> <span class=\"s\">En realidad hacen esto fuera de su cuerpo.<\u002Fspan> <span class=\"s\">Escupen jugos digestivos sobre el insecto que lo <span class=\"term\" data-k=\"liquefy\" tabindex=\"0\">licúan<\u002Fspan>.<\u002Fspan> <span class=\"s\">Luego pueden chupar parte de su comida poco a poco.<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">8<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">Other spiders weave different types of webs.<\u002Fspan> <span class=\"s\">Some build triangle webs, which look like a section of an orb web.<\u002Fspan> <span class=\"s\">The spider waits for its prey at one end corner of the web.<\u002Fspan> <span class=\"s\">Others build small sheet webs between tall blades of grass or branches of shrubs.<\u002Fspan> <span class=\"s\">Directly above this sheet, the spider may spin a web of nonsticky threads.<\u002Fspan> <span class=\"s\">The net causes a flying insect to lose its balance and fall onto the sheet, where the spider is waiting.<\u002Fspan> <span class=\"s\">Finally, many indoor spiders build tangle webs, or cobwebs, often in the corner of a room.<\u002Fspan> <span class=\"s\">They may look messy, but they are effective in catching prey.<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">Otras arañas tejen diferentes tipos de telarañas.<\u002Fspan> <span class=\"s\">Algunas construyen telarañas triangulares, que parecen una sección de una telaraña orbicular.<\u002Fspan> <span class=\"s\">La araña espera a su presa en una esquina de un extremo de la telaraña.<\u002Fspan> <span class=\"s\">Otras construyen pequeñas telarañas en forma de sábana entre altas briznas de hierba o ramas de arbustos.<\u002Fspan> <span class=\"s\">Directamente encima de esta sábana, la araña puede tejer una red de hilos no pegajosos.<\u002Fspan> <span class=\"s\">La red hace que un insecto volador pierda el equilibrio y caiga sobre la sábana, donde la araña está esperando.<\u002Fspan> <span class=\"s\">Por último, muchas arañas de interior construyen telarañas enredadas, o telarañas de polvo, a menudo en la esquina de una habitación.<\u002Fspan> <span class=\"s\">Pueden verse desordenadas, pero son eficaces para atrapar presas.<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">9<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">As a spider web continues to catch meals, it becomes damaged and needs repairs.<\u002Fspan> <span class=\"s\">Orb weavers often build a new web every day, and the task can take less than 30 minutes.<\u002Fspan> <span class=\"s\">If the web is not too damaged, the spider repairs it.<\u002Fspan> <span class=\"s\">Often it eats parts of the old web to save silk.<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">A medida que una telaraña sigue atrapando comidas, se daña y necesita reparaciones.<\u002Fspan> <span class=\"s\">Las tejedoras de orbe a menudo construyen una telaraña nueva cada día, y la tarea puede tomar menos de 30 minutos.<\u002Fspan> <span class=\"s\">Si la telaraña no está muy dañada, la araña la repara.<\u002Fspan> <span class=\"s\">A menudo se come partes de la telaraña vieja para ahorrar seda.<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">10<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">About half of all spiders do not build webs to catch prey.<\u002Fspan> <span class=\"s\">Spiders such as the jumping spider and the wolf spider are called wandering spiders.<\u002Fspan> <span class=\"s\">They find hiding places and wait for passing prey.<\u002Fspan> <span class=\"s\">Unlike a web-builder, this hunter has excellent eyesight.<\u002Fspan> <span class=\"s\">It pounces on insects and stuns them with a bite.<\u002Fspan> <span class=\"s\">Then the wanderer settles down for a nice lunch.<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">Cerca de la mitad de todas las arañas no construyen telarañas para atrapar presas.<\u002Fspan> <span class=\"s\">Las arañas como la araña saltarina y la araña lobo se llaman arañas errantes.<\u002Fspan> <span class=\"s\">Encuentran escondites y esperan a que pase una presa.<\u002Fspan> <span class=\"s\">A diferencia de una tejedora de telarañas, esta cazadora tiene una vista excelente.<\u002Fspan> <span class=\"s\">Se abalanza sobre los insectos y los aturde con una mordedura.<\u002Fspan> <span class=\"s\">Luego la errante se acomoda para un buen almuerzo.<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">11<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">Although large spiders such as the black widow are often featured in scary movies, most spiders are small and harmless to humans.<\u002Fspan> <span class=\"s\">They are useful animals and amazing food-catchers, and their unusual habits are fascinating to observe.<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">Aunque las arañas grandes como la viuda negra a menudo aparecen en películas de terror, la mayoría de las arañas son pequeñas e inofensivas para los humanos.<\u002Fspan> <span class=\"s\">Son animales útiles y asombrosas cazadoras de alimento, y sus hábitos inusuales son fascinantes de observar.<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============================================================= -->\n    <!-- PASSAGE 2 — MATH LITERACY CONNECTION (display only)            -->\n    <!-- ============================================================= -->\n    <section class=\"psg\" data-id=\"math\">\n      <div class=\"r-header\">\n        <div class=\"eyebrow\"><span class=\"en\">Math Literacy Connection · Expressions and Equations<\u002Fspan><span class=\"es\">Conexión matemática · Expresiones y ecuaciones<\u002Fspan><\u002Fdiv>\n        <h1>\n          <span class=\"en\">Spiders: In Pursuit of <span class=\"hl\">Prey<\u002Fspan><\u002Fspan>\n          <span class=\"es\">Arañas: en busca de <span class=\"hl\">presas<\u002Fspan><\u002Fspan>\n        <\u002Fh1>\n        <div class=\"lede\"><span class=\"en\">Area and Algebraic Expressions<\u002Fspan><span class=\"es\">Área y expresiones algebraicas<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"passage mathset\">\n        <p class=\"m-instr\"><span class=\"arw\">➤<\u002Fspan> <strong><span class=\"en\">Solve each problem. Show your work.<\u002Fspan><span class=\"es\">Resuelve cada problema. Muestra tu trabajo.<\u002Fspan><\u002Fstrong><\u002Fp>\n        <p class=\"m-intro\"><span class=\"en\">Lina has a pet tarantula. The tarantula’s leg span is 0.5 ft.<\u002Fspan><span class=\"es\">Lina tiene una tarántula como mascota. La envergadura de las patas de la tarántula es de 0.5 pies.<\u002Fspan><\u002Fp>\n\n        <div class=\"para\">\n          <div class=\"num\">1<\u002Fdiv>\n          <div class=\"body\">\n            <p><span class=\"en\">The cage for Lina’s tarantula will follow the guidelines for tarantula cages:<\u002Fspan><span class=\"es\">La jaula para la tarántula de Lina seguirá las pautas para jaulas de tarántulas:<\u002Fspan><\u002Fp>\n            <ul>\n              <li><span class=\"en\">The cage’s width should be 3 times the tarantula’s leg span.<\u002Fspan><span class=\"es\">El ancho de la jaula debe ser 3 veces la envergadura de las patas de la tarántula.<\u002Fspan><\u002Fli>\n              <li><span class=\"en\">The cage’s length should be 2 times the tarantula’s leg span.<\u002Fspan><span class=\"es\">El largo de la jaula debe ser 2 veces la envergadura de las patas de la tarántula.<\u002Fspan><\u002Fli>\n              <li><span class=\"en\">The cage’s height should be 1.5 times the tarantula’s leg span.<\u002Fspan><span class=\"es\">La altura de la jaula debe ser 1.5 veces la envergadura de las patas de la tarántula.<\u002Fspan><\u002Fli>\n            <\u002Ful>\n            <p><span class=\"en\">What is the surface area of Lina’s cage?<\u002Fspan><span class=\"es\">¿Cuál es el área superficial de la jaula de Lina?<\u002Fspan><\u002Fp>\n            <div class=\"solline\"><span class=\"sollbl\"><span class=\"en\">SOLUTION<\u002Fspan><span class=\"es\">SOLUCIÓN<\u002Fspan><\u002Fspan><span class=\"solrule\"><\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">2<\u002Fdiv>\n          <div class=\"body\">\n            <p><span class=\"en\">Lina orders moss for the bottom of the new cage. The moss costs $3.25 per package. There is also a shipping fee of $3 no matter how many packages Lina orders.<\u002Fspan><span class=\"es\">Lina pide musgo para el fondo de la nueva jaula. El musgo cuesta $3.25 por paquete. También hay una tarifa de envío de $3 sin importar cuántos paquetes pida Lina.<\u002Fspan><\u002Fp>\n            <div class=\"subpart\">\n              <span class=\"let\">a.<\u002Fspan>\n              <div class=\"subbody\">\n                <p><span class=\"en\">Write an expression for the total cost in dollars of ordering the moss. Tell what any variables represent. Show your work.<\u002Fspan><span class=\"es\">Escribe una expresión para el costo total en dólares de pedir el musgo. Di qué representan las variables. Muestra tu trabajo.<\u002Fspan><\u002Fp>\n                <div class=\"solline\"><span class=\"sollbl\"><span class=\"en\">SOLUTION<\u002Fspan><span class=\"es\">SOLUCIÓN<\u002Fspan><\u002Fspan><span class=\"solrule\"><\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"subpart\">\n              <span class=\"let\">b.<\u002Fspan>\n              <div class=\"subbody\">\n                <p><span class=\"en\">Lina orders 4 packages of moss. Use your expression to find the total cost of the moss. Show your work.<\u002Fspan><span class=\"es\">Lina pide 4 paquetes de musgo. Usa tu expresión para encontrar el costo total del musgo. Muestra tu trabajo.<\u002Fspan><\u002Fp>\n                <div class=\"solline\"><span class=\"sollbl\"><span class=\"en\">SOLUTION<\u002Fspan><span class=\"es\">SOLUCIÓN<\u002Fspan><\u002Fspan><span class=\"solrule\"><\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">3<\u002Fdiv>\n          <div class=\"body\">\n            <p><span class=\"en\">Lina feeds a cricket to her tarantula every 12 days. She feeds it a grasshopper every 8 days. She feeds both insects to the tarantula today. How many days will it be until Lina feeds the tarantula both insects on the same day? Show your work.<\u002Fspan><span class=\"es\">Lina le da un grillo a su tarántula cada 12 días. Le da un saltamontes cada 8 días. Hoy le da ambos insectos a la tarántula. ¿Cuántos días pasarán hasta que Lina le dé ambos insectos a la tarántula el mismo día? Muestra tu trabajo.<\u002Fspan><\u002Fp>\n            <div class=\"solline\"><span class=\"sollbl\"><span class=\"en\">SOLUTION<\u002Fspan><span class=\"es\">SOLUCIÓN<\u002Fspan><\u002Fspan><span class=\"solrule\"><\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fdiv><!-- /wrap -->\n\n  <!-- ===================== PACER DOCK ===================== -->\n  <div class=\"pacedock\" aria-label=\"Reading pacer controls\">\n    <button id=\"pprev\" onclick=\"pacePrev()\" aria-label=\"Previous sentence\">‹<\u002Fbutton>\n    <span class=\"pcount\" id=\"pcount\">1 / 1<\u002Fspan>\n    <button id=\"pnext\" class=\"main\" onclick=\"paceNext()\" aria-label=\"Next sentence\">›<\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- ===================== VOCAB POPOVER ===================== -->\n  <div class=\"pop\" id=\"pop\"><\u002Fdiv>\n\n  <!-- ===================== IMAGE LIGHTBOX ===================== -->\n  <div class=\"lightbox\" id=\"lightbox\" onclick=\"if(event.target===this)closeLight()\">\n    <figure class=\"lightcard\">\n      <button class=\"lightclose\" onclick=\"closeLight()\" aria-label=\"Close\">✕<\u002Fbutton>\n      <img id=\"lightimg\" alt=\"\">\n      <figcaption id=\"lightcap\"><\u002Ffigcaption>\n    <\u002Ffigure>\n  <\u002Fdiv>\n\n<script>\n/* ===================== VOCABULARY GLOSSARY ===================== */\nvar GLOSS={\n  arachnids:{en:{w:'Arachnids',d:'A class of animals with two main body parts and eight legs, such as spiders, scorpions, and ticks.'},\n             es:{w:'Arácnidos',d:'Una clase de animales con dos partes principales del cuerpo y ocho patas, como las arañas, los escorpiones y las garrapatas.'}},\n  arthropods:{en:{w:'Arthropods',d:'A large group of animals that have a hard outer skeleton and jointed legs; it includes both insects and arachnids.'},\n              es:{w:'Artrópodos',d:'Un gran grupo de animales que tienen un esqueleto externo duro y patas articuladas; incluye tanto a los insectos como a los arácnidos.'}},\n  exoskeleton:{en:{w:'Exoskeleton',d:'A hard outer covering that protects and supports the body of an animal, like a shell.'},\n               es:{w:'Exoesqueleto',d:'Una cubierta externa dura que protege y sostiene el cuerpo de un animal, como un caparazón.'}},\n  snare:{en:{w:'Snare',d:'A trap used for catching something, such as prey.'},\n         es:{w:'Trampa',d:'Un dispositivo que se usa para atrapar algo, como una presa.'}},\n  venom:{en:{w:'Venom',d:'A poisonous fluid that some animals inject through a bite or sting.'},\n         es:{w:'Veneno',d:'Un líquido tóxico que algunos animales inyectan a través de una mordedura o picadura.'}},\n  liquefy:{en:{w:'Liquefy',d:'To turn something solid into a liquid.'},\n           es:{w:'Licuar',d:'Convertir algo sólido en líquido.'}}\n};\n\n/* ===================== PASSAGES ===================== */\nvar PASSAGES=[\n  {en:'Reading: Spiders',   es:'Lectura: Arañas'},\n  {en:'Math Connection',    es:'Conexión matemática'}\n];\nvar ACTIVE=0;\n\n/* ===================== STATE ===================== */\nvar lang='en';\nvar pacerOn=false;\nvar idx=0;\nvar sentences=[];\n\n/* ===================== PASSAGE SWITCHING ===================== */\nfunction updatePsgName(){\n  var p=PASSAGES[ACTIVE];\n  document.getElementById('psgname').innerHTML=\n    '<span class=\"en\">'+p.en+'<\u002Fspan><span class=\"es\">'+p.es+'<\u002Fspan>'+\n    '<span class=\"pos\">'+(ACTIVE+1)+' / '+PASSAGES.length+'<\u002Fspan>';\n  document.getElementById('psgprev').disabled = ACTIVE===0;\n  document.getElementById('psgnext').disabled = ACTIVE===PASSAGES.length-1;\n}\nfunction setPassage(i){\n  if(i<0||i>=PASSAGES.length) return;\n  ACTIVE=i;\n  var secs=document.querySelectorAll('.psg');\n  for(var k=0;k<secs.length;k++){ secs[k].classList.toggle('active',k===i); }\n  document.querySelectorAll('.psg.active .para').forEach(function(el){el.classList.add('show');});\n  hidePop();\n  updatePsgName();\n  syncPacerAvailability();\n  window.scrollTo({top:0,behavior:'auto'});\n  if(pacerOn){ rebuildSentences(); idx=0; applyPace(); }\n  else { document.querySelectorAll('.s').forEach(function(s){s.classList.remove('active','done');}); }\n}\n\n/* hide the Reading Pacer on passages that have no prose to pace (e.g. Math Connection) */\nfunction activeHasSentences(){\n  return document.querySelectorAll('.psg.active .para .body > .en > .s, .psg.active .para .body > .es > .s').length>0;\n}\nfunction syncPacerAvailability(){\n  var btn=document.getElementById('pacertoggle');\n  if(!btn) return;\n  if(activeHasSentences()){\n    btn.style.display='';\n  }else{\n    if(pacerOn) togglePacer();   // turn it off before hiding\n    btn.style.display='none';\n  }\n}\nfunction nextPassage(){ setPassage(ACTIVE+1); }\nfunction prevPassage(){ setPassage(ACTIVE-1); }\n\n/* ===================== LANGUAGE ===================== */\nfunction setLang(l){\n  lang=l;\n  document.body.classList.toggle('lang-es',l==='es');\n  document.body.classList.toggle('lang-en',l!=='es');\n  document.getElementById('btn-en').classList.toggle('on',l==='en');\n  document.getElementById('btn-es').classList.toggle('on',l==='es');\n  updatePsgName();\n  updateLightCaption();\n  hidePop();\n  if(pacerOn){ rebuildSentences(); idx=Math.min(idx,sentences.length-1); applyPace(); }\n}\n\n/* ===================== READING PACER ===================== */\nfunction rebuildSentences(){\n  var langSel = lang==='es' ? '.es' : '.en';\n  sentences = Array.prototype.slice.call(document.querySelectorAll('.psg.active .para .body '+langSel+' > .s'));\n  document.querySelectorAll('.s').forEach(function(s){s.classList.remove('active','done');});\n}\n\nfunction togglePacer(){\n  pacerOn=!pacerOn;\n  document.body.classList.toggle('pacer',pacerOn);\n  var tb=document.getElementById('pacertoggle');\n  if(pacerOn){\n    tb.classList.remove('off');\n    tb.innerHTML='■ <span class=\"en\">Pacer: ON<\u002Fspan><span class=\"es\">Marcapasos: SÍ<\u002Fspan>';\n    document.querySelectorAll('.psg.active .para').forEach(function(el){el.classList.add('show');});\n    rebuildSentences(); idx=0; applyPace();\n  }else{\n    tb.classList.add('off');\n    tb.innerHTML='▸ <span class=\"en\">Reading Pacer<\u002Fspan><span class=\"es\">Marcapasos<\u002Fspan>';\n    document.querySelectorAll('.s').forEach(function(s){s.classList.remove('active','done');});\n  }\n}\n\nfunction applyPace(){\n  sentences.forEach(function(s,i){\n    s.classList.remove('active','done');\n    if(i<idx) s.classList.add('done');\n    if(i===idx) s.classList.add('active');\n  });\n  var cur=sentences[idx];\n  if(cur){\n    var r=cur.getBoundingClientRect();\n    var mid=window.innerHeight*0.42;\n    window.scrollBy({top:r.top-mid,behavior:'smooth'});\n  }\n  document.getElementById('pcount').textContent=(idx+1)+' / '+sentences.length;\n  document.getElementById('pprev').style.opacity = idx===0 ? '.35' : '1';\n  document.getElementById('pnext').style.opacity = idx>=sentences.length-1 ? '.35' : '1';\n}\nfunction paceNext(){ if(idx<sentences.length-1){idx++;applyPace();} }\nfunction pacePrev(){ if(idx>0){idx--;applyPace();} }\n\ndocument.addEventListener('keydown',function(e){\n  if(!pacerOn)return;\n  if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' '){e.preventDefault();paceNext();}\n  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();pacePrev();}\n});\n\n/* ===================== REVEAL ON SCROLL ===================== */\nvar io=new IntersectionObserver(function(es){\n  es.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('show'); io.unobserve(e.target);} });\n},{threshold:.18});\ndocument.querySelectorAll('.psg.active .para').forEach(function(el){io.observe(el);});\n\n/* ===================== PROGRESS BAR ===================== */\nwindow.addEventListener('scroll',function(){\n  var h=document.documentElement;\n  var pct=(h.scrollTop)/(h.scrollHeight-h.clientHeight)*100;\n  document.getElementById('prog').style.width=Math.min(100,pct)+'%';\n});\n\n/* ===================== VOCAB POPOVER ===================== */\nvar pop=document.getElementById('pop');\nfunction hidePop(){pop.style.display='none';}\nfunction showPop(el){\n  var key=el.getAttribute('data-k'); var g=GLOSS[key]; if(!g)return;\n  var d=g[lang];\n  pop.innerHTML='<span class=\"x\" onclick=\"hidePop()\">✕<\u002Fspan><div class=\"word\">'+d.w+'<\u002Fdiv>'+d.d;\n  pop.style.display='block';\n  var r=el.getBoundingClientRect();\n  var pw=pop.offsetWidth, ph=pop.offsetHeight;\n  var left=Math.min(window.innerWidth-pw-14, Math.max(14, r.left));\n  var top=r.bottom+10; if(top+ph>window.innerHeight){top=r.top-ph-10;}\n  pop.style.left=(left+window.scrollX)+'px'; pop.style.top=(top+window.scrollY)+'px';\n}\ndocument.addEventListener('click',function(e){\n  var t=e.target.closest('.term');\n  if(t){e.stopPropagation();showPop(t);}\n  else if(!e.target.closest('.pop')){hidePop();}\n});\ndocument.addEventListener('keydown',function(e){\n  if((e.key==='Enter'||e.key===' ')&&document.activeElement&&document.activeElement.classList.contains('term')){\n    e.preventDefault();showPop(document.activeElement);\n  }\n});\nwindow.addEventListener('scroll',hidePop);\n\n/* ===================== IMAGE LIGHTBOX ===================== */\nfunction openLight(fig){\n  var img=fig.querySelector('img'); if(!img)return;\n  var lb=document.getElementById('lightbox');\n  document.getElementById('lightimg').src=img.getAttribute('src');\n  document.getElementById('lightimg').alt=img.getAttribute('alt')||'';\n  lb.dataset.capEn=img.getAttribute('data-cap-en')||'';\n  lb.dataset.capEs=img.getAttribute('data-cap-es')||'';\n  updateLightCaption();\n  lb.classList.add('open');\n}\nfunction updateLightCaption(){\n  var lb=document.getElementById('lightbox');\n  document.getElementById('lightcap').textContent = lang==='es' ? (lb.dataset.capEs||'') : (lb.dataset.capEn||'');\n}\nfunction closeLight(){ document.getElementById('lightbox').classList.remove('open'); }\ndocument.addEventListener('keydown',function(e){\n  if(e.key==='Escape') closeLight();\n  if((e.key==='Enter'||e.key===' ')&&document.activeElement&&document.activeElement.classList.contains('figure')){\n    e.preventDefault();openLight(document.activeElement);\n  }\n});\n\n/* ===================== INIT ===================== */\nupdatePsgName();\nsyncPacerAvailability();\n<\u002Fscript>\n<script>\n(function(){\n  window.toggleLOSC=function(){\n    var p=document.getElementById('loscPop'),b=document.getElementById('loscPill');\n    if(!p)return; var o=p.classList.toggle('open'); if(b){b.classList.toggle('open',o);b.setAttribute('aria-expanded',o);}\n  };\n  document.addEventListener('click',function(e){\n    var p=document.getElementById('loscPop'); if(!p||!p.classList.contains('open'))return;\n    if(!p.contains(e.target)&&!e.target.closest('.losc-pill')){p.classList.remove('open');var b=document.getElementById('loscPill');if(b){b.classList.remove('open');b.setAttribute('aria-expanded','false');}}\n  });\n  document.querySelectorAll('.losc-ed[id]').forEach(function(el){\n    try{var v=localStorage.getItem(el.id); if(v!=null) el.innerHTML=v;}catch(e){}\n    el.addEventListener('input',function(){try{localStorage.setItem(el.id,el.innerHTML);}catch(e){}});\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
